<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Voyages — Paul Zabotto</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Paul Zabotto — Carte interactive de voyages." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <!-- Portfolio nav tokens (variables + nav only, no reset that would break the map) -->
    <link rel="stylesheet" href="../../css/base/variables.css" />
    <link rel="stylesheet" href="../../css/layout/nav.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ══════════════════════════════════════════
         PORTFOLIO NAVIGATION
         Always in frosted-glass state — dark map
         is always behind it.
    ══════════════════════════════════════════ -->
    <header>
      <nav class="site-nav is-scrolled" role="navigation" aria-label="Main navigation">
        <a href="../../index.html" class="nav-logo">Paul Zabotto</a>
        <ul class="nav-links" role="list">
          <li><a href="../../developer/index.html" class="nav-link">Developer</a></li>
          <li><a href="../../hobbies/index.html"   class="nav-link is-active" aria-current="page">Hobbies</a></li>
          <li><a href="../../contact/index.html"   class="nav-link">Contact</a></li>
        </ul>
      </nav>
    </header>

    <!-- Map fills viewport below the 70px nav -->
    <div id="map"></div>

    <div id="stats-bar">
        <div class="stat-item">
            <span class="stat-number" id="stat-countries">0</span>
            <span class="stat-label">pays</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
            <span class="stat-number" id="stat-photos">0</span>
            <span class="stat-label">photos</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
            <span class="stat-number" id="stat-continents">0</span>
            <span class="stat-label">continents</span>
        </div>
    </div>

    <div id="side-panel">
        <button id="panel-close" aria-label="Fermer">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
        <div id="panel-inner"></div>
    </div>
    <div id="panel-backdrop"></div>

    <div id="lightbox">
        <div id="lightbox-overlay"></div>
        <button id="lb-close" aria-label="Fermer">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M1 1L17 17M17 1L1 17" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
        </button>
        <button id="lb-prev">&#8249;</button>
        <button id="lb-next">&#8250;</button>
        <div id="lb-img-wrap">
            <img id="lb-img" src="" alt="">
        </div>
        <div id="lb-info">
            <span id="lb-counter"></span>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-providers@1.13.0/leaflet-providers.js"></script>
    <script src="script.js"></script>
</body>
</html>
